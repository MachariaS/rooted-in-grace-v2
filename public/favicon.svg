<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- halo ring, broken at the base so the roots can escape it -->
  <circle cx="60" cy="58" r="52" stroke="#C9A24B" stroke-width="1.6"
          stroke-dasharray="245 82" stroke-dashoffset="-165"
          stroke-linecap="round" opacity="0.85"/>

  <!-- canopy -->
  <circle cx="60" cy="30" r="16.5" fill="#5C6B45"/>
  <circle cx="43" cy="40" r="13.5" fill="#7A8A5C"/>
  <circle cx="77" cy="40" r="13.5" fill="#7A8A5C"/>
  <circle cx="52" cy="27" r="10" fill="#A9B18D" opacity="0.9"/>
  <circle cx="70" cy="46" r="9" fill="#8FA06B" opacity="0.9"/>

  <!-- trunk -->
  <path d="M57.2 84 C57.6 72 56.8 62 55 52 C54 46.5 55.5 42 58 39
           M62.8 84 C62.4 72 63.4 62 65.4 52 C66.4 46.5 65 42 63 39
           M58 39 C59 41.5 61 41.5 63 39"
        stroke="#6B4E36" stroke-width="0" fill="none"/>
  <path d="M55.4 86 C56.2 72 55.2 61 53.6 51.5 C52.8 46 54.6 41 57.6 37.5
           L62.4 37.5 C65.4 41 67.2 46 66.4 51.5 C64.8 61 63.8 72 64.6 86 Z"
        fill="#6B4E36"/>
  <!-- small branch hints -->
  <path d="M56 52 C51 49 47.5 45.5 46 42 M64 52 C69 49 72.5 45.5 74 42"
        stroke="#6B4E36" stroke-width="2.6" stroke-linecap="round"/>

  <!-- roots -->
  <g stroke="#6B4E36" stroke-linecap="round" fill="none">
    <path d="M55.4 86 C50 92 42 94 33 95" stroke-width="3"/>
    <path d="M57.5 86 C54 94 48 99 41 102" stroke-width="2.4"/>
    <path d="M60 86 C60 94 60 100 60 105" stroke-width="2.6"/>
    <path d="M62.5 86 C66 94 72 99 79 102" stroke-width="2.4"/>
    <path d="M64.6 86 C70 92 78 94 87 95" stroke-width="3"/>
    <path d="M52 91 C48 92.5 45 92.5 41 91.5" stroke-width="1.6" opacity="0.75"/>
    <path d="M68 91 C72 92.5 75 92.5 79 91.5" stroke-width="1.6" opacity="0.75"/>
  </g>

  <!-- gold light in the canopy -->
  <circle cx="60" cy="22" r="3.4" fill="#E8CB7E" opacity="0.95"/>
</svg>
